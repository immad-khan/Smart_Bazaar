version: '3.8'

services:
  smartbazaar-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Qdrant__Url=http://qdrant:6333
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - Supabase__Url=${Supabase__Url}
      - Supabase__Key=${Supabase__Key}
      - Cloudinary__CloudName=${Cloudinary__CloudName}
      - Cloudinary__ApiKey=${Cloudinary__ApiKey}
      - Cloudinary__ApiSecret=${Cloudinary__ApiSecret}
    depends_on:
      - qdrant
    networks:
      - smartbazaar-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_READ_ONLY_API_KEY=${QDRANT_READ_ONLY_API_KEY:-}
    networks:
      - smartbazaar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  smartbazaar-network:
    driver: bridge

volumes:
  qdrant_storage:
